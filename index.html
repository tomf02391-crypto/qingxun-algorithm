<script>
        /**
         * 清浔杀组预测 Pro · 整合 Telegram 机器人特色算法 + 共识投票
         * 算法：天机策、玄机策、逆形态、趋势捕手、冷热探针、银河锚点、威震天机、五行之合
         *      京派、枫派、通派、奇杀、异杀、势杀（共14种）
         */
        const isTelegram = !!(window.Telegram && window.Telegram.WebApp);
        let tgInstance = null;
        if (isTelegram) {
            tgInstance = window.Telegram.WebApp;
            tgInstance.ready();
            tgInstance.expand();
        }

        // ==================== 配置 ====================
        const CONFIG = {
            API_URLS: [
                'https://super.pc28998.com/history/JND28',
                'https://api.example.com/jnd28',
                'https://another-api.com/jnd28'
            ],
            FIELD_MAP: { period: 'expect', opencode: 'opencode', opentime: 'opentime_text', opentimeStamp: 'opentime' },
            ALGORITHM_NAMES: {
                shuying_v1: '天机策',
                shuying_v2: '玄机策',
                module1: '逆形态',
                module2: '趋势捕手',
                module3: '冷热探针',
                module4: '银河锚点',
                module5: '威震天机',
                fusion_vote: '五行之合',
                jingpai: '京派',
                fengpai: '枫派',
                tongpai: '通派',
                qisha: '奇杀',
                yisha: '异杀',
                shisha: '势杀'
            },
            COMBO_MAP: {
                '小单': ['大单', '小双'],
                '小双': ['大双', '小单'],
                '大单': ['大双', '小单'],
                '大双': ['小双', '大单']
            },
            STORAGE_KEYS: {
                THEME: 'qingxun-theme-v2',
                PREFS: 'qingxun-prefs-v2',
                BETS: 'qingxun-bets-v2',
                CACHE: 'qingxun-cache-v2',
                BET_HISTORY: 'qingxun-bet-history-v2'
            },
            FETCH_INTERVAL: 3 * 60 * 1000,
            FETCH_TIMEOUT: 10000,
            MAX_HISTORY: 50,
            VIRTUAL_BALANCE: 10000,
            RETRY_DELAY: 3000,
            MAX_RETRIES: 3,
            CACHE_TTL: 10 * 60 * 1000,
            BET_AMOUNT: 100,
            BET_WIN: 190
        };

        // ==================== 缓存功能（新增） ====================
        const CACHE_KEY = 'qingxun_prediction_cache';

        function getCachedPrediction(period, algo) {
            try {
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                return cache[period + '_' + algo] || null;
            } catch { return null; }
        }

        function savePrediction(period, algo, pred) {
            try {
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                cache[period + '_' + algo] = pred;
                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            } catch {}
        }

        // ==================== 工具 ====================
        const Utils = {
            debounce(fn, ms) { let t; return (...a) => { clearTimeout(t);
                    t = setTimeout(() => fn.apply(this, a), ms); }; },
            throttle(fn, ms) { let last = 0; return (...a) => { const n = Date.now(); if (n - last > ms) { last = n;
                        fn.apply(this, a); } }; },

            drawSparkline(canvas, data, color) {
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                const w = rect.width,
                    h = rect.height;
                const pad = 4;
                const min = Math.min(...data),
                    max = Math.max(...data, min + 1);
                const step = (w - pad * 2) / (data.length - 1);
                const scale = (v) => h - pad - ((v - min) / (max - min)) * (h - pad * 2);
                ctx.clearRect(0, 0, w, h);
                ctx.beginPath();
                ctx.moveTo(pad, scale(data[0]));
                for (let i = 1; i < data.length; i++) ctx.lineTo(pad + i * step, scale(data[i]));
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                ctx.lineTo(pad + (data.length - 1) * step, h);
                ctx.lineTo(pad, h);
                ctx.closePath();
                ctx.fillStyle = color.replace(')', ', 0.08)').replace('rgb', 'rgba');
                ctx.fill();
            },

            barChart(labels, values, maxVal) {
                const width = 400,
                    height = 56;
                const pad = { top: 4, bottom: 16, left: 2, right: 2 };
                const cw = width - pad.left - pad.right,
                    ch = height - pad.top - pad.bottom;
                const gap = 4;
                const bw = Math.max(2, (cw - gap * (labels.length - 1)) / labels.length);
                let bars = '',
                    texts = '';
                labels.forEach((label, i) => {
                    const val = values[i];
                    const bh = maxVal > 0 ? Math.max(2, (val / maxVal) * ch) : 2;
                    const x = pad.left + i * (bw + gap);
                    const y = pad.top + ch - bh;
                    const op = 0.30 + (val / maxVal) * 0.70;
                    bars +=
                        `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="var(--accent)" opacity="${op.toFixed(2)}"/>`;
                    texts +=
                        `<text x="${(x + bw / 2).toFixed(1)}" y="${(height - 2).toFixed(1)}" text-anchor="middle" font-size="7" fill="var(--text-muted)" font-weight="600">${label}</text>`;
                });
                return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" width="100%" height="100%">${bars}${texts}</svg>`;
            },

            judgeSizeOdd(total) { return `${total >= 14 ? '大' : '小'}${total % 2 === 1 ? '单' : '双'}`; },
            getPredictFromKill(kill) { return CONFIG.COMBO_MAP[kill] || ['--', '--']; },
            isKillHit(kill, actual) { return kill !== '--' && kill !== actual; },
            fmtNum(n) { return n.toString().padStart(2, '0'); },

            downloadCSV(filename, rows) {
                const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            }
        };

        // ==================== 算法引擎（整合机器人全部算法） ====================
        const Algorithms = {
            // ----- 基础算法 -----
            module1(prevGroup) {
                const map = { "大双": "小双", "小双": "大单", "大单": "小单", "小单": "大双" };
                return map[prevGroup] || null;
            },
            module2(recentSums) {
                if (recentSums.length < 3) return null;
                const last3 = recentSums.slice(0, 3);
                const last4 = recentSums.slice(0, 4);
                if (last4.length === 4 && last4.every(v => v <= 13)) return "大双";
                if (last3.every(v => v <= 13)) return "大单";
                if (last4.length === 4 && last4.every(v => v >= 14)) return "小单";
                if (last3.every(v => v >= 14)) return "小双";
                return null;
            },
            module3(historyGroups) {
                if (!historyGroups.length) return null;

                function findMiss(target) {
                    const idx = historyGroups.findIndex(g => g === target);
                    return idx === -1 ? historyGroups.length : idx;
                }
                const daDanMiss = findMiss("大单");
                const daShuangMiss = findMiss("大双");
                const recent5 = historyGroups.slice(0, 5);
                const xiaoDanCnt = recent5.filter(g => g === "小单").length;
                if (daDanMiss >= 5) return "小双";
                if (daShuangMiss >= 5) return "小单";
                if (xiaoDanCnt >= 3) return "大双";
                return null;
            },
            module4(lastSum) { return lastSum === 14 ? "大双" : null; },
            module5(x, y, z) {
                let N = x * 100 + y * 10 + z;
                let S = x + y + z;
                let A = N + S;
                let B = A;
                if (x !== 0) B *= x;
                if (y !== 0) B *= y;
                if (z !== 0) B *= z;
                let temp = B;
                if (x !== 0) temp /= Math.sqrt(x);
                if (y !== 0) temp /= Math.sqrt(y);
                if (z !== 0) temp /= Math.sqrt(z);
                temp = Math.floor(temp);
                if (S !== 0) temp = Math.floor(temp / S);
                let R = temp * S;
                let lastTwo = Math.abs(R % 100);
                let size = lastTwo < 50 ? "小" : "大";
                let parity = (Math.abs(R) % 2 === 0) ? "双" : "单";
                const pred = size + parity;
                const opposite = { "小单": "大双", "小双": "大单", "大单": "小双", "大双": "小单" };
                return opposite[pred] || null;
            },
            fusionVote(history, prevGroup, prevSum, currentNums, weights = [1, 1, 1, 1, 1]) {
                const histGroups = history.slice().reverse().map(h => h.combo);
                const histSums = history.slice().reverse().map(h => h.sum);
                const votes = [
                    Algorithms.module1(prevGroup),
                    Algorithms.module2(histSums),
                    Algorithms.module3(histGroups),
                    Algorithms.module4(prevSum),
                    Algorithms.module5(currentNums[0], currentNums[1], currentNums[2])
                ];
                const cnt = { "小单": 0, "小双": 0, "大单": 0, "大双": 0 };
                votes.forEach((v, i) => { if (v && cnt[v] !== undefined) cnt[v] += weights[i]; });
                let maxV = -Infinity,
                    winner = "小单";
                for (const g of ["小单", "小双", "大单", "大双"]) {
                    if (cnt[g] > maxV) { maxV = cnt[g];
                        winner = g; }
                }
                return winner;
            },
            shuyingV1(historyData) {
                if (!historyData || historyData.length < 3) return { killGroup: '--', predictCombos: ['--', '--'] };
                const [h1, h2, h3] = historyData;
                const mul28 = h3.sum * 28;
                const subPart = (h1.sum + h2.sum + h3.sum) * 3.14;
                const intPart = Math.floor((mul28 - subPart) / 28);
                const kill = Utils.judgeSizeOdd(intPart);
                return { killGroup: kill, predictCombos: Utils.getPredictFromKill(kill) };
            },
            shuyingV2(historyData) {
                if (!historyData || historyData.length < 3) return { killGroup: '--', predictCombos: ['--', '--'] };
                const [h1, h2, h3] = historyData;
                const num1 = parseInt(`${h1.nums[0]}${h2.nums[1]}${h1.nums[2]}`) || 0;
                const num2 = parseInt(`${h3.nums[0]}${h2.nums[1]}${h3.nums[2]}`) || 0;
                const intPart = Math.floor(((num1 + num2) / 28) / 3.14);
                const kill = Utils.judgeSizeOdd(intPart);
                return { killGroup: kill, predictCombos: Utils.getPredictFromKill(kill) };
            },

            // ----- 特色算法（来自机器人） -----
            jingpai(history) {
                if (history.length < 3) return null;
                const A = history[history.length - 3],
                    B = history[history.length - 2],
                    C = history[history.length - 1];
                const tail = (x) => x % 10;
                const first = (x) => parseInt(String(x)[0]) || 0;
                const val1 = tail(A.sum + B.nums[1] + C.sum);
                const val2 = first(A.nums[2] + B.nums[1] + A.nums[1] + C.sum);
                const val3 = tail(A.nums[0] + B.nums[1] + A.sum);
                const total = (val1 + val2 + val3) % 4;
                return ["小单", "小双", "大单", "大双"][total];
            },
            fengpai(history) {
                if (history.length < 3) return null;
                const A = history[history.length - 3],
                    B = history[history.length - 2];
                const result = A.nums[1] + A.nums[2] + B.nums[0] + B.nums[2] - A.nums[0] - B.nums[1];
                const idx = Math.abs(result) % 4;
                return ["小单", "小双", "大单", "大双"][idx];
            },
            tongpai(history) {
                if (history.length < 3) return null;
                const A = history[history.length - 3],
                    B = history[history.length - 2],
                    C = history[history.length - 1];
                const tail = (x) => x % 10;
                const val1 = tail(A.nums[0] + A.nums[1] + A.sum);
                const val2 = tail(B.nums[0] + B.nums[2] + C.nums[0]);
                const val3 = tail(B.nums[1] + C.nums[1] + C.nums[2]);
                const total = (val1 + val2 + val3) % 4;
                return ["小单", "小双", "大单", "大双"][total];
            },
            qisha(history) {
                if (history.length < 3) return null;
                const A = history[history.length - 3],
                    B = history[history.length - 2],
                    C = history[history.length - 1];
                const val = (A.nums[1] + B.nums[1] + C.sum) % 10;
                return (val >= 5 ? "大" : "小") + (val % 2 ? "单" : "双");
            },
            yisha(history) {
                if (history.length < 3) return null;
                const A = history[history.length - 3],
                    B = history[history.length - 2],
                    C = history[history.length - 1];
                const val = (A.sum % 10 + B.sum % 10 + C.sum % 10) % 10;
                return (val >= 5 ? "大" : "小") + (val % 2 ? "单" : "双");
            },
            shisha(history) {
                if (history.length < 40) return null;
                const recent = history.slice(-20);
                const prev = history.slice(-40, -20);
                const ratios = (seq) => {
                    if (!seq.length) return [0, 0];
                    const big = seq.filter(p => p.sum >= 14).length;
                    const odd = seq.filter(p => p.sum % 2).length;
                    return [big / seq.length, odd / seq.length];
                };
                const [bigR, oddR] = ratios(recent);
                const [bigP, oddP] = ratios(prev);
                const predSize = bigR > bigP ? "大" : "小";
                const predParity = oddR > oddP ? "单" : "双";
                const pred = predSize + predParity;
                const opposite = { "小单": "大双", "小双": "大单", "大单": "小双", "大双": "小单" };
                return opposite[pred] || null;
            },

            // ----- 统一预测入口 -----
            predict(algName, history3, prevGroup, prevSum, currentNums, fullHistoryPrev, weights) {
                let kill = null;
                switch (algName) {
                    case 'shuying_v1':
                        return Algorithms.shuyingV1(history3);
                    case 'shuying_v2':
                        return Algorithms.shuyingV2(history3);
                    case 'module1':
                        kill = Algorithms.module1(prevGroup);
                        break;
                    case 'module2':
                        kill = Algorithms.module2(fullHistoryPrev.slice().reverse().map(h => h.sum));
                        break;
                    case 'module3':
                        kill = Algorithms.module3(fullHistoryPrev.slice().reverse().map(h => h.combo));
                        break;
                    case 'module4':
                        kill = Algorithms.module4(prevSum);
                        break;
                    case 'module5':
                        kill = Algorithms.module5(currentNums[0], currentNums[1], currentNums[2]);
                        break;
                    case 'fusion_vote':
                        kill = Algorithms.fusionVote(fullHistoryPrev, prevGroup, prevSum, currentNums, weights);
                        break;
                    case 'jingpai':
                        kill = Algorithms.jingpai(fullHistoryPrev);
                        break;
                    case 'fengpai':
                        kill = Algorithms.fengpai(fullHistoryPrev);
                        break;
                    case 'tongpai':
                        kill = Algorithms.tongpai(fullHistoryPrev);
                        break;
                    case 'qisha':
                        kill = Algorithms.qisha(fullHistoryPrev);
                        break;
                    case 'yisha':
                        kill = Algorithms.yisha(fullHistoryPrev);
                        break;
                    case 'shisha':
                        kill = Algorithms.shisha(fullHistoryPrev);
                        break;
                    default:
                        return Algorithms.shuyingV1(history3);
                }
                if (!kill) return { killGroup: '--', predictCombos: ['--', '--'] };
                return { killGroup: kill, predictCombos: Utils.getPredictFromKill(kill) };
            },

            // ----- 共识投票（全算法） -----
            getAllPredictions(history3, prevGroup, prevSum, currentNums, fullHistoryPrev) {
                const algNames = Object.keys(CONFIG.ALGORITHM_NAMES);
                const results = {};
                for (const alg of algNames) {
                    try {
                        const pred = Algorithms.predict(alg, history3, prevGroup, prevSum, currentNums, fullHistoryPrev);
                        results[alg] = pred;
                    } catch (_) {
                        results[alg] = { killGroup: '--', predictCombos: ['--', '--'] };
                    }
                }
                return results;
            },

            getConsensus(allPreds) {
                const comboVotes = [],
                    killVotes = [];
                for (const alg in allPreds) {
                    const p = allPreds[alg];
                    if (p.killGroup !== '--') {
                        comboVotes.push(p.predictCombos[0]);
                        comboVotes.push(p.predictCombos[1]);
                        killVotes.push(p.killGroup);
                    }
                }
                const comboCounter = {},
                    killCounter = {};
                for (const c of comboVotes) { comboCounter[c] = (comboCounter[c] || 0) + 1; }
                for (const k of killVotes) { killCounter[k] = (killCounter[k] || 0) + 1; }
                const sortedCombos = Object.entries(comboCounter).sort((a, b) => b[1] - a[1]);
                const sortedKills = Object.entries(killCounter).sort((a, b) => b[1] - a[1]);
                return {
                    topCombos: sortedCombos.slice(0, 2),
                    topKills: sortedKills.slice(0, 2),
                    totalVotes: killVotes.length
                };
            }
        };

        // ==================== 语音引擎 ====================
        class VoiceEngine {
            constructor() {
                this.synth = window.speechSynthesis || null;
                this.enabled = false;
                this.rate = 1.0;
                this.speaking = false;
                this.lastAnnouncedPeriod = '';
                this.lastPredictionPeriod = null;
                this.voiceCache = null;
            }
            getChineseVoice() {
                if (!this.synth) return null;
                if (this.voiceCache) return this.voiceCache;
                const voices = this.synth.getVoices();
                const priorities = ['zh-CN', 'zh_TW', 'zh_HK', 'cmn-Hans-CN'];
                for (const lang of priorities) {
                    const v = voices.find(v => v.lang === lang && !v.localService) || voices.find(v => v.lang === lang);
                    if (v) { this.voiceCache = v; return v; }
                }
                const fallback = voices.find(v => v.lang.startsWith('zh'));
                if (fallback) { this.voiceCache = fallback; return fallback; }
                return null;
            }
            speak(text) {
                if (!this.synth || !text) return;
                this.stop();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = this.rate;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                const voice = this.getChineseVoice();
                if (voice) utterance.voice = voice;
                let resumeInterval;

                const startResumeLoop = () => {
                    resumeInterval = setInterval(() => {
                        if (this.synth.paused || !this.synth.speaking) return;
                        try { this.synth.resume(); } catch (_) {}
                    }, 5000);
                };
                utterance.onstart = () => { this.speaking = true;
                    this.updateUI();
                    startResumeLoop(); };
                utterance.onend = () => { clearInterval(resumeInterval);
                    this.speaking = false;
                    this.updateUI(); };
                utterance.onerror = (e) => {
                    clearInterval(resumeInterval);
                    this.speaking = false;
                    this.updateUI();
                    if (e.error !== 'interrupted' && e.error !== 'canceled') {
                        setTimeout(() => this.speak(text), 500);
                    }
                };
                this.synth.speak(utterance);
            }
            stop() {
                if (this.synth) { this.synth.cancel();
                    this.speaking = false;
                    this.updateUI(); }
            }
            updateUI() {
                const btn = document.getElementById('voice-toggle');
                btn?.classList.toggle('speaking', this.speaking);
            }
            announceOpenResult(data) {
                if (!this.enabled || !data.length) return;
                const latest = data[data.length - 1];
                if (latest.period === this.lastAnnouncedPeriod) return;
                this.lastAnnouncedPeriod = latest.period;
                const numsStr = latest.nums.join(' 加 ');
                this.speak(`最新开奖，第${latest.period}期，开奖号码${numsStr}，等于${latest.sum}，形态${latest.combo}`);
            }
            announcePrediction(data, algName, algDisplay) {
                if (!this.enabled || data.length < 4) return;
                const history3 = data.slice(data.length - 3);
                const prev = data[data.length - 2];
                const current = data[data.length - 1];
                const fullPrev = data.slice(0, data.length - 1);
                const pred = Algorithms.predict(algName, history3, prev.combo, prev.sum, current.nums, fullPrev);
                if (pred.killGroup === '--') return;
                const nextPeriod = Number(data[data.length - 1].period) + 1;
                if (this.lastPredictionPeriod === nextPeriod) return;
                this.lastPredictionPeriod = nextPeriod;
                const text =
                    `下一期预测，第${nextPeriod}期，使用${algDisplay}算法，推荐${pred.predictCombos[0]}加${pred.predictCombos[1]}，排除杀组${pred.killGroup}`;
                setTimeout(() => this.speak(text), 3000);
            }
            announceBetResult(period, bet, actual, won, amount) {
                if (!this.enabled) return;
                const result = won ? '命中！恭喜！' : '未命中，再接再厉';
                const profit = won ? `+${amount}` : `-${CONFIG.BET_AMOUNT}`;
                this.speak(`第${period}期，投注${bet}，开奖${actual}，${result}，盈亏${profit}筹码`);
            }
        }

                };

                this.apiData = [];

                this.fetchTimer = null;
                this.countdownRAF = null;
                this.isFetching = false;

                this.notifyEnabled = false;
                this.virtualBalance = CONFIG.VIRTUAL_BALANCE;

                this.currentBetPeriod = null;
                this.betHistory = [];
                this.totalWinCount = 0;
                this.totalBetCount = 0;
                this.algoCompareOpen = false;
                this.fusionWeights = [1, 1, 1, 1, 1];
                this.cacheTimestamp = 0;
                this.retryCount = 0;
                this.renderPending = false;
                this.currentSource = '';
                this.isSettling = false;
                this.isTelegram = isTelegram;
                this.autoAnnounce = false;
                this.musicEnabled = false;
                this.musicSourceIndex = 0;
                this.musicSources = [
                    'https://assets.mixkit.co/music/preview/mixkit-soft-and-calm-background-music-726.mp3',
                    'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                    'https://cdn.pixabay.com/download/audio/2022/05/27/audio_2c3b9d2c6d.mp3'
                ];

                this.voice = new VoiceEngine();

                // 初始化所有算法统计
                for (const k of Object.keys(CONFIG.ALGORITHM_NAMES)) {
                    this.algorithmStats[k] = { total: 0, win: 0, currentConsecutive: 0, winRate: 0 };
                }

                this.initTelegram();
                this.init();
            }

            // ==================== Telegram 初始化 ====================
            initTelegram() {
                if (this.isTelegram && tgInstance) {
                    document.body.classList.add('in-telegram');
                    document.body.classList.remove('not-in-telegram');
                    this.dom.tgEnvBadge.style.display = 'block';
                    const version = tgInstance.version || 'unknown';
                    this.dom.tgVersionInfo.textContent = `Telegram Mini App v${version}`;
                    this.applyTelegramTheme();
                    tgInstance.onEvent('themeChanged', () => { this.applyTelegramTheme(); });
                    tgInstance.onEvent('close', () => { this.closeTelegram(); });
                    tgInstance.MainButton.setText('📤 分享预测');
                    tgInstance.MainButton.onClick(() => this.tgMainAction());
                    tgInstance.MainButton.show();
                    if (tgInstance.HapticFeedback) { this.tgHaptic = tgInstance.HapticFeedback; }
                    tgInstance.ready();
                } else {
                    document.body.classList.add('not-in-telegram');
                    document.body.classList.remove('in-telegram');
                }
            }

            applyTelegramTheme() {
                if (!this.isTelegram || !tgInstance) return;
                const theme = tgInstance.themeParams || {};
                const root = document.documentElement;
                const map = {
                    '--tg-bg-color': theme.bg_color || '#0e0e18',
                    '--tg-text-color': theme.text_color || '#f0f0ff',
                    '--tg-hint-color': theme.hint_color || '#b0b0d0',
                    '--tg-link-color': theme.link_color || '#8b5cf6',
                    '--tg-button-color': theme.button_color || '#8b5cf6',
                    '--tg-button-text-color': theme.button_text_color || '#ffffff',
                    '--tg-secondary-bg-color': theme.secondary_bg_color || '#16162a',
                    '--tg-header-bg-color': theme.header_bg_color || '#0e0e18',
                    '--tg-section-bg-color': theme.section_bg_color || 'rgba(20,20,40,0.60)',
                    '--tg-section-header-text-color': theme.section_header_text_color || '#f0f0ff',
                    '--tg-subtitle-text-color': theme.subtitle_text_color || '#b0b0d0',
                    '--tg-destructive-text-color': theme.destructive_text_color || '#f87171',
                };
                for (const [key, val] of Object.entries(map)) {
                    if (val) root.style.setProperty(key, val);
                }
                root.classList.add('tg-theme');
                const isDark = theme.bg_color && theme.bg_color !== '#f0f0fa' &&
                    !theme.bg_color.startsWith('#f') && !theme.bg_color.startsWith('#e');
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = isDark ? 'dark' : 'light';
                if (currentTheme !== newTheme) {
                    document.documentElement.setAttribute('data-theme', newTheme);
                    this.updateThemeIcon(newTheme);
                }
            }

            closeTelegram() {
                if (this.isTelegram && tgInstance) tgInstance.close();
                else { if (window.history.length > 1) window.history.back();
                    else window.close(); }
            }

            tgMainAction() {
                if (!this.isTelegram || !tgInstance) return;
                if (this.tgHaptic) { try { this.tgHaptic.impactOccurred('medium'); } catch (_) {} }
                if (!this.apiData || this.apiData.length < 4) {
                    this.showToast('数据未就绪，请稍候', 'warning');
                    return;
                }
                const latest = this.apiData[this.apiData.length - 1];
                const history3 = this.apiData.slice(this.apiData.length - 3);
                const prev = this.apiData[this.apiData.length - 2];
                const current = this.apiData[this.apiData.length - 1];
                const fullPrev = this.apiData.slice(0, this.apiData.length - 1);
                const pred = Algorithms.predict(this.currentAlgorithm, history3, prev.combo, prev.sum, current.nums,
                    fullPrev, this.fusionWeights);
                const nextPeriod = Number(latest.period) + 1;
                const algName = CONFIG.ALGORITHM_NAMES[this.currentAlgorithm];
                const shareText =
                    `🔮 清浔杀组预测 Pro\n📅 第${nextPeriod}期预测 (${algName})\n🎯 推荐: ${pred.predictCombos[0]} + ${pred.predictCombos[1]}\n🚫 排除: ${pred.killGroup}\n📊 历史胜率: ${this.getCurrentWinRate()}%\n---\n🔗 清浔杀组 · 智能预测`;
                if (tgInstance.shareToStory) {
                    tgInstance.shareToStory(shareText);
                    this.showToast('已打开分享', 'success');
                } else if (navigator.share) {
                    navigator.share({ title: '清浔杀组预测', text: shareText }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(shareText).then(() => {
                        this.showToast('已复制预测结果', 'success');
                    }).catch(() => {
                        this.showToast('请手动复制: ' + shareText, 'info');
                    });
                }
            }

            getCurrentWinRate() {
                const stats = this.algorithmStats[this.currentAlgorithm];
                if (!stats || stats.total === 0) return '0.0';
                return (stats.win / stats.total * 100).toFixed(1);
            }

            // ==================== 初始化 ====================
            init() {
                this.initTheme();
                this.loadPreferences();
                this.loadBets();
                this.loadBetHistory();
                this.loadCache();
                this.bindKeyboard();
                this.restoreMusicState();
                if (this.apiData.length > 0) this.render();
                this.fetchData();
                this.fetchTimer = setInterval(() => this.fetchData(), CONFIG.FETCH_INTERVAL);
                if (window.speechSynthesis) {
                    window.speechSynthesis.onvoiceschanged = () => { this.voice.getChineseVoice(); };
                }
                if (this.isTelegram && tgInstance) tgInstance.ready();
            }

            initTheme() {
                const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.THEME);
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = saved || (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
                this.updateThemeIcon(theme);
            }

            toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                const newTheme = isDark ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem(CONFIG.STORAGE_KEYS.THEME, newTheme);
                this.updateThemeIcon(newTheme);
                this.renderMonitor();
                this.renderTrendChart();
            }

            updateThemeIcon(theme) {
                this.dom.themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
            }

            loadCache() {
                try {
                    const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.CACHE);
                    if (!raw) return;
                    const cache = JSON.parse(raw);
                    if (Date.now() - cache.timestamp < CONFIG.CACHE_TTL) {
                        this.apiData = cache.data || [];
                        this.cacheTimestamp = cache.timestamp;
                        this.currentSource = '缓存';
                    }
                } catch (_) {}
            }

            saveCache() {
                try {
                    localStorage.setItem(CONFIG.STORAGE_KEYS.CACHE, JSON.stringify({
                        data: this.apiData,
                        timestamp: Date.now()
                    }));
                } catch (_) {}
            }

            // ==================== 数据获取 ====================
            async fetchData() {
                if (this.isFetching) return;
                this.isFetching = true;
                this.setStatus('loading');

                let lastError = null;
                let successSource = '';

                for (const url of CONFIG.API_URLS) {
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), CONFIG.FETCH_TIMEOUT);
                        const response = await fetch(url, {
                            method: 'GET',
                            mode: 'cors',
                            cache: 'no-cache',
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);

                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const res = await response.json();
                        if (res.code !== 1 || !Array.isArray(res.data) || !res.data.length) {
                            throw new Error('数据格式异常');
                        }

                        const formatted = res.data
                            .filter(item => item[CONFIG.FIELD_MAP.period] && item[CONFIG.FIELD_MAP.opencode])
                            .map(item => {
                                const nums = item[CONFIG.FIELD_MAP.opencode].split(',')
                                    .map(n => parseInt(n.trim(), 10)).filter(n => !isNaN(n));
                                const sum = nums.reduce((a, b) => a + b, 0);
                                return {
                                    period: String(item[CONFIG.FIELD_MAP.period]),
                                    nums,
                                    sum,
                                    combo: Utils.judgeSizeOdd(sum),
                                    opentime: item[CONFIG.FIELD_MAP.opentime],
                                    opentimeStamp: item[CONFIG.FIELD_MAP.opentimeStamp]
                                };
                            });

                        this.apiData = formatted.reverse();
                        if (this.apiData.length < 4) throw new Error('有效数据不足4期');
                        successSource = url;
                        break;
                    } catch (e) {
                        lastError = e;
                        console.warn(`数据源 ${url} 失败：`, e.message);
                    }
                }

                if (this.apiData.length >= 4) {
                    this.currentSource = successSource || '未知源';
                    this.settleBet();
                    const newHash = this.apiData.map(d => d.period).join(',');
                    this.calculateAllStats();
                    this.updateMissedStats();
                    this.render();
                    this.setupCountdown();
                    this.saveCache();
                    if (this.autoAnnounce && this.voice.enabled) {
                        this.voice.announceOpenResult(this.apiData);
                        this.voice.announcePrediction(this.apiData, this.currentAlgorithm, CONFIG.ALGORITHM_NAMES[this
                            .currentAlgorithm]);
                    }
                    this.setStatus('ready', this.currentSource);
                    this.lastDataHash = newHash;
                    this.retryCount = 0;
                    this.showToast(`数据已更新（来源：${this.currentSource}）`, 'success');
                    if (this.isTelegram && tgInstance) {
                        try { tgInstance.HapticFeedback?.impactOccurred('light'); } catch (_) {}
                    }
                } else {
                    this.setStatus('error', lastError?.message || '所有数据源不可用');
                    this.showToast(`数据加载失败: ${lastError?.message}`, 'error');
                    if (this.apiData.length > 0) {
                        this.showToast('使用本地缓存（可能已过期）', 'warning');
                        this.currentSource = '缓存（过期）';
                        this.render();
                        this.setupCountdown();
                    } else if (this.retryCount < CONFIG.MAX_RETRIES) {
                        this.retryCount++;
                        setTimeout(() => this.fetchData(), CONFIG.RETRY_DELAY * this.retryCount);
                    }
                }
                this.isFetching = false;
            }

            // ==================== 投注结算 ====================
            settleBet() {
                if (this.isSettling) return;
                this.isSettling = true;
                const latest = this.apiData[this.apiData.length - 1];
                if (!latest) { this.isSettling = false; return; }

                if (this.currentBet && this.currentBetPeriod && this.currentBetPeriod !== latest.period) {
                    const won = this.currentBet === latest.combo;
                    const profit = won ? CONFIG.BET_WIN : -CONFIG.BET_AMOUNT;
                    this.virtualBalance += profit;
                    this.totalBetCount++;
                    if (won) this.totalWinCount++;

                    this.betHistory.push({
                        period: latest.period,
                        bet: this.currentBet,
                        actual: latest.combo,
                        won: won,
                        profit: profit,
                        balance: this.virtualBalance
                    });

                    this.voice.announceBetResult(latest.period, this.currentBet, latest.combo, won, profit);

                    const icon = won ? '🎉' : '😅';
                    const msg = won ?
                        `第${latest.period}期 ${this.currentBet} → ${latest.combo} 命中！+${CONFIG.BET_WIN}筹码` :
                        `第${latest.period}期 ${this.currentBet} → ${latest.combo} 未命中 -${CONFIG.BET_AMOUNT}筹码`;
                    this.showToast(`${icon} ${msg}`, won ? 'success' : 'error');

                    if (this.isTelegram && tgInstance && this.tgHaptic) {
                        try { this.tgHaptic.impactOccurred(won ? 'heavy' : 'light'); } catch (_) {}
                    }

                    this.saveBetHistory();
                    this.currentBet = null;
                    this.currentBetPeriod = null;
                    this.saveBets();
                    this.updateBetSummary();
                    this.renderBetHistory();
                }
                this.isSettling = false;
            }

            placeBet(combo) {
                if (!this.apiData.length) { this.showToast('请等待数据加载完成', 'warning'); return; }
                if (this.virtualBalance < CONFIG.BET_AMOUNT) { this.showToast('资金不足！请重置', 'error'); return; }

                const latest = this.apiData[this.apiData.length - 1];
                this.currentBet = combo;
                this.currentBetPeriod = latest.period;

                document.querySelectorAll('.bet-btn').forEach(btn => {
                    btn.classList.toggle('active-bet', btn.dataset.bet === combo);
                });

                this.saveBets();
                this.updateBetSummary();
                this.showToast(`已下注 ${combo}，等待第${latest.period}期开奖`, 'success');
                this.dom.betStatusMsg.textContent = '⏳ 等待开奖...';

                if (this.isTelegram && tgInstance && this.tgHaptic) {
                    try { this.tgHaptic.impactOccurred('light'); } catch (_) {}
                }
            }

            updateBetSummary() {
                this.dom.virtualBalance.textContent = this.virtualBalance;
                const profit = this.virtualBalance - CONFIG.VIRTUAL_BALANCE;
                const el = this.dom.totalProfit;
                el.textContent = profit >= 0 ? `+${profit}` : profit;
                el.className = `num ${profit >= 0 ? 'profit' : 'loss'}`;
                const rate = this.totalBetCount > 0 ? ((this.totalWinCount / this.totalBetCount) * 100).toFixed(1) : '--';
                this.dom.betHitRate.textContent = this.totalBetCount > 0 ? `${rate}%` : '--%';
                if (this.currentBet && this.currentBetPeriod) {
                    this.dom.currentBet.textContent = `${this.currentBet} (第${this.currentBetPeriod}期)`;
                    this.dom.betStatusMsg.textContent = '⏳ 等待开奖...';
                } else {
                    this.dom.currentBet.textContent = '无';
                    this.dom.betStatusMsg.textContent = '';
                }
            }

            renderBetHistory() {
                const tbody = this.dom.betHistoryBody;
                tbody.innerHTML = '';
                const history = this.betHistory.slice(-20).reverse();
                if (!history.length) {
                    tbody.innerHTML =
                        '<tr><td colspan="4" style="color:var(--text-muted);padding:12px;">暂无投注记录</td></tr>';
                    return;
                }
                history.forEach(h => {
                    const tr = document.createElement('tr');
                    const cls = h.won ? 'win' : 'lose';
                    const txt = h.won ? `+${h.profit}` : `${h.profit}`;
                    tr.innerHTML =
                        `<td>${h.period}</td><td>${h.bet}</td><td>${h.actual}</td><td class="${cls}">${txt}</td>`;
                    tbody.appendChild(tr);
                });
            }

            loadBetHistory() {
                try {
                    const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.BET_HISTORY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        this.betHistory = data.history || [];
                        this.totalWinCount = data.totalWinCount || 0;
                        this.totalBetCount = data.totalBetCount || 0;
                    }
                } catch (_) {}
            }

            saveBetHistory() {
                try {
                    localStorage.setItem(CONFIG.STORAGE_KEYS.BET_HISTORY, JSON.stringify({
                        history: this.betHistory,
                        totalWinCount: this.totalWinCount,
                        totalBetCount: this.totalBetCount
                    }));
                } catch (_) {}
            }

            clearBetHistory() {
                if (this.betHistory.length === 0) return;
                if (!confirm('确定要清空所有投注历史吗？')) return;
                this.betHistory = [];
                this.totalWinCount = 0;
                this.totalBetCount = 0;
                this.saveBetHistory();
                this.renderBetHistory();
                this.updateBetSummary();
                this.showToast('投注历史已清空', 'info');
            }

            // ==================== 统计计算 ====================
            calculateAllStats() {
                if (this.apiData.length < 4) return;
                const testPeriods = Math.min(this.apiData.length - 3, CONFIG.MAX_HISTORY);
                const startI = Math.max(0, this.apiData.length - 3 - testPeriods);

                const cache = {};
                const getPred = (alg, idx) => {
                    const key = `${alg}|${idx}`;
                    if (cache[key]) return cache[key];
                    const history3 = this.apiData.slice(idx, idx + 3);
                    const prev = this.apiData[idx + 2];
                    const current = this.apiData[idx + 3];
                    const fullPrev = this.apiData.slice(0, idx + 3);
                    const result = Algorithms.predict(alg, history3, prev.combo, prev.sum, current.nums, fullPrev,
                        this.fusionWeights);
                    cache[key] = result;
                    return result;
                };

                for (const alg of Object.keys(CONFIG.ALGORITHM_NAMES)) {
                    let total = 0,
                        win = 0,
                        consecutive = 0;
                    for (let i = startI; i < this.apiData.length - 3; i++) {
                        const pred = getPred(alg, i);
                        if (pred.killGroup === '--') continue;
                        total++;
                        if (Utils.isKillHit(pred.killGroup, this.apiData[i + 3].combo)) win++;
                    }
                    for (let i = this.apiData.length - 4; i >= 0; i--) {
                        const pred = getPred(alg, i);
                        if (pred.killGroup === '--') break;
                        if (Utils.isKillHit(pred.killGroup, this.apiData[i + 3].combo)) consecutive++;
                        else break;
                    }
                    this.algorithmStats[alg] = {
                        total,
                        win,
                        currentConsecutive: consecutive,
                        winRate: total > 0 ? (win / total) * 100 : 0
                    };
                }
            }

            updateMissedStats() {
                if (!this.apiData.length) return;
                const len = this.apiData.length;
                this.missedStats.sums = new Array(28).fill(len);
                const combos = ['大', '小', '单', '双', '大单', '大双', '小单', '小双'];
                combos.forEach(c => this.missedStats.combos[c] = len);

                for (let i = 0; i < len; i++) {
                    const item = this.apiData[i];
                    if (this.missedStats.sums[item.sum] === len) this.missedStats.sums[item.sum] = i;
                    for (const key of combos) {
                        let match = false;
                        if (key === '大' && item.combo.startsWith('大')) match = true;
                        else if (key === '小' && item.combo.startsWith('小')) match = true;
                        else if (key === '单' && item.combo.endsWith('单')) match = true;
                        else if (key === '双' && item.combo.endsWith('双')) match = true;
                        else if (key === item.combo) match = true;
                        if (match && this.missedStats.combos[key] === len) this.missedStats.combos[key] = i;
                    }
                }
            }

            // ==================== 渲染 ====================
            render() {
                if (this.renderPending) return;
                this.renderPending = true;
                requestAnimationFrame(() => {
                    this.renderPending = false;
                    this._doRender();
                });
            }

            _doRender() {
                this.renderLatest();
                this.renderMissed();
                this.renderPrediction();
                this.renderHistory();
                this.renderMonitor();
                this.renderAlgoCompare();
                this.renderTrendChart();
                this.updateBetSummary();
                this.renderBetHistory();
            }

            renderLatest() {
                const latest = this.apiData[this.apiData.length - 1];
                if (!latest) return;
                this.dom.curPeriod.textContent = latest.period;
                this.dom.curTime.textContent = latest.opentime;
                this.dom.curCombo.textContent = latest.combo;
                this.dom.curSum.textContent = latest.sum;

                const container = this.dom.latestNums;
                container.innerHTML = '';
                latest.nums.forEach((num, idx) => {
                    const ball = document.createElement('div');
                    ball.className = 'hero-ball';
                    ball.textContent = num;
                    ball.style.animationDelay = `${idx * 0.1}s`;
                    container.appendChild(ball);
                    if (idx < latest.nums.length - 1) {
                        const sep = document.createElement('span');
                        sep.className = 'hero-sep';
                        sep.textContent = '+';
                        container.appendChild(sep);
                    }
                });
                const sep = document.createElement('span');
                sep.className = 'hero-sep';
                sep.textContent = '=';
                container.appendChild(sep);
                const sumEl = document.createElement('span');
                sumEl.className = 'hero-eq';
                sumEl.textContent = latest.sum;
                container.appendChild(sumEl);
            }

            renderMissed() {
                if (!this.apiData.length) return;
                document.getElementById('missed-stats').style.display = 'block';

                let sumHTML = '<tr>' + Array.from({ length: 28 }, (_, i) =>
                    `<td style="font-weight:700;color:var(--text-secondary);">${i}</td>`).join('') + '</tr>';
                sumHTML += '<tr>' + this.missedStats.sums.map((v) => {
                    const cls = v >= 20 ? 'hot' : (v <= 3 ? 'cold' : 'neutral');
                    return `<td class="${cls}">${v}</td>`;
                }).join('') + '</tr>';
                this.dom.sumMissedBody.innerHTML = sumHTML;

                const combos = ['大', '小', '单', '双', '大单', '大双', '小单', '小双'];
                let comboHTML = '<tr>' + combos.map(c =>
                    `<td style="font-weight:700;color:var(--text-secondary);">${c}</td>`).join('') + '</tr>';
                comboHTML += '<tr>' + combos.map(c => {
                    const v = this.missedStats.combos[c] || 0;
                    const cls = v >= 10 ? 'hot' : (v <= 2 ? 'cold' : 'neutral');
                    return `<td class="${cls}">${v}</td>`;
                }).join('') + '</tr>';
                this.dom.comboMissedBody.innerHTML = comboHTML;
            }

            // ===== 修改点：renderPrediction 保持原样（不缓存未来预测） =====
            renderPrediction() {
                if (!this.apiData || this.apiData.length < 4) return;
                const history3 = this.apiData.slice(this.apiData.length - 3);
                const prev = this.apiData[this.apiData.length - 2];
                const current = this.apiData[this.apiData.length - 1];
                const fullPrev = this.apiData.slice(0, this.apiData.length - 1);
                const pred = Algorithms.predict(this.currentAlgorithm, history3, prev.combo, prev.sum, current.nums,
                    fullPrev, this.fusionWeights);
                const nextPeriod = Number(this.apiData[this.apiData.length - 1].period) + 1;

                this.dom.aiNextPeriod.textContent = `预测期数：${nextPeriod}`;
                this.dom.predictCombo1.textContent = pred.predictCombos[0];
                this.dom.predictCombo2.textContent = pred.predictCombos[1];
                this.dom.killGroup.textContent = pred.killGroup;
                const name = CONFIG.ALGORITHM_NAMES[this.currentAlgorithm];
                this.dom.algorithmTag.textContent = name;
                this.dom.tableAlgoTag.textContent = name;

                // ----- 共识投票 -----
                const allPreds = Algorithms.getAllPredictions(history3, prev.combo, prev.sum, current.nums, fullPrev);
                const consensus = Algorithms.getConsensus(allPreds);
                if (consensus.totalVotes > 0) {
                    this.dom.consensusBox.style.display = 'block';
                    const topCombo = consensus.topCombos[0];
                    const topKill = consensus.topKills[0];
                    this.dom.consensusCombo.textContent = topCombo ? topCombo[0] : '--';
                    this.dom.consensusComboVote.textContent = topCombo ? `(${topCombo[1]}票)` : '';
                    this.dom.consensusKill.textContent = topKill ? topKill[0] : '--';
                    this.dom.consensusKillVote.textContent = topKill ? `(${topKill[1]}票)` : '';
                } else {
                    this.dom.consensusBox.style.display = 'none';
                }

                if (this.isTelegram && tgInstance) {
                    const winRate = this.getCurrentWinRate();
                    tgInstance.MainButton.setText(`📤 分享预测 (胜率${winRate}%)`);
                }
            }

            // ===== 修改点：renderHistory 使用缓存 =====
            renderHistory() {
                const tbody = this.dom.predictionTbody;
                tbody.innerHTML = '';
                if (!this.apiData || this.apiData.length < 4) {
                    this.dom.stats.innerHTML = '<span>基础胜率</span><span class="rate">0.0%</span><span>0 / 0</span>';
                    return;
                }

                let winCount = 0,
                    totalCount = 0;
                const maxShow = Math.min(CONFIG.MAX_HISTORY, this.apiData.length - 3);
                const startI = Math.max(0, this.apiData.length - 3 - maxShow);
                const fragment = document.createDocumentFragment();
                const rows = [];

                for (let i = startI; i < this.apiData.length - 3; i++) {
                    const current = this.apiData[i + 3];
                    const period = current.period;
                    // ---- 从缓存读取预测 ----
                    let pred = getCachedPrediction(period, this.currentAlgorithm);
                    if (!pred) {
                        const history3 = this.apiData.slice(i, i + 3);
                        const prev = this.apiData[i + 2];
                        const fullPrev = this.apiData.slice(0, i + 3);
                        pred = Algorithms.predict(this.currentAlgorithm, history3, prev.combo, prev.sum, current.nums,
                            fullPrev, this.fusionWeights);
                        savePrediction(period, this.currentAlgorithm, pred);
                    }
                    if (pred.killGroup === '--') continue;
                    const hit = Utils.isKillHit(pred.killGroup, current.combo);
                    totalCount++;
                    if (hit) winCount++;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${current.period}</td>
                        <td>${current.nums.join('+')}=${current.sum}（${current.combo}）</td>
                        <td>${pred.predictCombos.join('+')}</td>
                        <td>${pred.killGroup}</td>
                        <td><span class="badge-result ${hit ? 'hit' : 'miss'}">${hit ? '✓ 命中' : '✗ 未命中'}</span></td>
                    `;
                    rows.push(tr);
                }

                for (let i = rows.length - 1; i >= 0; i--) fragment.appendChild(rows[i]);
                tbody.appendChild(fragment);

                const winRate = totalCount > 0 ? ((winCount / totalCount) * 100).toFixed(1) : 0;
                this.dom.stats.innerHTML = `
                    <span>基础胜率</span>
                    <span class="rate">${winRate}%</span>
                    <span>${winCount} / ${totalCount}</span>
                `;
            }

            // 为了确保完整，您应复制原文件中的剩余方法，因为它们未被改动。
